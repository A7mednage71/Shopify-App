mutation UpdateCustomerDefaultAddress(
  $customerAccessToken: String!
  $addressId: ID!
) {
  customerDefaultAddressUpdate(
    customerAccessToken: $customerAccessToken
    addressId: $addressId
  ) {
    customer {
      id
      defaultAddress {
        id
      }
    }
    customerUserErrors {
      code
      message
    }
  }
}
