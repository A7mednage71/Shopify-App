query SearchProducts($query: String!, $first: Int = 20) {
  search(query: $query, types: PRODUCT, first: $first) {
    totalCount
    nodes {
      ... on Product {
        id
        title
        description
        handle
        featuredImage { url altText }
        priceRange { minVariantPrice { amount currencyCode } }
        compareAtPriceRange { minVariantPrice { amount currencyCode } }
        ratingMetafield: metafield(namespace: "custom", key: "rating") { value }
        reviewCountMetafield: metafield(namespace: "custom", key: "review_count") { value }
      }
    }
  }
}
