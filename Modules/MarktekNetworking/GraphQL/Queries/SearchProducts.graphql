query SearchProducts($query: String!, $first: Int!, $after: String, $language: LanguageCode) @inContext(language: $language) {
  search(query: $query, first: $first, after: $after, types: [PRODUCT]) {
    totalCount
    edges {
      cursor
      node {
        ... on Product {
          id
          title
          description
          handle
          vendor           # مهم جداً للـ Filter بالـ Brand (مثل: Nike, Adidas)
          productType      # مهم جداً للـ Filter بنوع المنتج (مثل: T-Shirt, Shoes)
          tags             # مصفوفة الـ Tags (ممتازة لعمل فلاتر مخصصة مثل: New, Sale)
          availableForSale # للـ Filter بالمنتجات المتاحة في المخزن فقط (In Stock)
          
          # بنجيب الـ Options هنا فقط لو عايز تظهر للمستخدم إن المنتج فيه ألوان/مقاسات متوفرة
          options {
            name
            values
          }
          
          # السعر الأساسي لعرضه في الكارت ولعمل فلترة بالـ Price Range
          priceRange {
            minVariantPrice { amount currencyCode }
            maxVariantPrice { amount currencyCode }
          }
          
          # صورة واحدة فقط تظهر في كارت المنتج لتوفير الـ Data
          images(first: 1) {
            edges { 
              node { 
                url 
                altText 
              } 
            }
          }
          
          # تفاصيل الـ Variants بشكل مبسط جداً بدون بيانات معقدة
          variants(first: 10) {
            edges {
              node {
                id
                title
                availableForSale
                price { amount currencyCode }
              }
            }
          }
          metafields(identifiers: [
            { namespace: "reviews", key: "items" }
          ]) {
            key
            namespace
            value
            type
            references(first: 100) {
              edges {
                node {
                  ... on Metaobject {
                    id
                    handle
                    type
                    updatedAt
                    product: field(key: "product") { key type value }
                    customerName: field(key: "customer_name") { key type value }
                    rating: field(key: "rating") { key type value }
                    title: field(key: "title") { key type value }
                    body: field(key: "body") { key type value }
                    createdAt: field(key: "created_at") { key type value }
                    approved: field(key: "approved") { key type value }
                  }
                }
              }
            }
          }
        }
      }
    }
    pageInfo { hasNextPage endCursor }
  }
}
