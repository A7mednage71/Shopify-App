query GetCustomerAddresses($customerAccessToken: String!) {
  customer(customerAccessToken: $customerAccessToken) {
    defaultAddress {
      id
      address1
      address2
      city
      province
      zip
      country
      firstName
      lastName
      phone
    }
    addresses(first: 50) {
      edges {
        node {
          id
          address1
          address2
          city
          province
          zip
          country
          firstName
          lastName
          phone
        }
      }
    }
  }
}

