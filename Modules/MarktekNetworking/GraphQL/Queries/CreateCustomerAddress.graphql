mutation CreateCustomerAddress(
  $customerAccessToken: String!
  $address: MailingAddressInput!
) {
  customerAddressCreate(
    customerAccessToken: $customerAccessToken
    address: $address
  ) {
    customerAddress {
      id
      address1
      address2
      city
      province
      zip
      country
      firstName
      lastName
      phone
    }
    customerUserErrors {
      code
      message
    }
  }
}
