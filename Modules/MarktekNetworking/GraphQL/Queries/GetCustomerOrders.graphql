query GetCustomerOrders($customerAccessToken: String!, $first: Int!, $language: LanguageCode) @inContext(language: $language) {
  customer(customerAccessToken: $customerAccessToken) {
    firstName
    lastName
    orders(first: $first, sortKey: PROCESSED_AT, reverse: true) {
      edges {
        node {
          id
          name
          orderNumber
          processedAt
          financialStatus
          fulfillmentStatus
          currentTotalPrice {
            amount
            currencyCode
          }
          shippingAddress {
            address1
            address2
            city
            province
            country
            zip
            phone
          }
          lineItems(first: 5) {
            edges {
              node {
                title
                quantity
                originalTotalPrice {
                  amount
                  currencyCode
                }
                variant {
                  id
                  product {
                    id
                  }
                  image {
                    url
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
