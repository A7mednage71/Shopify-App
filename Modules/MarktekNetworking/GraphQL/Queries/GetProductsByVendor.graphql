query GetProductsByVendor($query: String!, $first: Int!, $after: String, $language: LanguageCode) @inContext(language: $language) {
  products(first: $first, after: $after, query: $query) {
    edges {
      cursor
      node {
        id
        title
        description
        handle
        vendor
        productType
        tags
        availableForSale
        options {
          name
          values
        }
        priceRange {
          minVariantPrice { amount currencyCode }
          maxVariantPrice { amount currencyCode }
        }
        images(first: 1) {
          edges {
            node {
              url
              altText
            }
          }
        }
        variants(first: 10) {
          edges {
            node {
              id
              title
              availableForSale
              price { amount currencyCode }
            }
          }
        }
        metafields(identifiers: [
          { namespace: "reviews", key: "items" }
        ]) {
          key
          namespace
          value
          type
          references(first: 100) {
            edges {
              node {
                ... on Metaobject {
                  id
                  handle
                  type
                  updatedAt
                  product: field(key: "product") { key type value }
                  customerName: field(key: "customer_name") { key type value }
                  rating: field(key: "rating") { key type value }
                  title: field(key: "title") { key type value }
                  body: field(key: "body") { key type value }
                  createdAt: field(key: "created_at") { key type value }
                  approved: field(key: "approved") { key type value }
                }
              }
            }
          }
        }
      }
    }
    pageInfo { hasNextPage endCursor }
  }
}
