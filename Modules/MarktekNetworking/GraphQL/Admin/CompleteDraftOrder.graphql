mutation CompleteDraftOrder($id: ID!, $paymentPending: Boolean) {
  draftOrderComplete(id: $id, paymentPending: $paymentPending) {
    draftOrder {
      id
      status
      order {
        id
        name
        createdAt
        totalPriceSet { shopMoney { amount currencyCode } }
        email
      }
    }
    userErrors { field message }
  }
}
