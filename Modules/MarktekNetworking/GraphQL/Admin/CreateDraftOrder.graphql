mutation CreateDraftOrder($input: DraftOrderInput!) {
  draftOrderCreate(input: $input) {
    draftOrder {
      id
      name
      status
      subtotalPrice
      totalPrice
      totalTax
      currencyCode
      lineItems(first: 20) {
        edges {
          node {
            id
            title
            quantity
            originalUnitPrice
            discountedUnitPrice
            variant {
              id
              title
              price
              inventoryQuantity
              availableForSale
            }
          }
        }
      }
    }
    userErrors { field message }
  }
}
