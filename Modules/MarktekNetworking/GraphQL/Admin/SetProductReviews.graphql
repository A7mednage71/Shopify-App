mutation SetProductReviews($productId: ID!, $reviewIdsJson: String!) {
  metafieldsSet(
    metafields: [
      {
        ownerId: $productId
        namespace: "reviews"
        key: "items"
        type: "list.metaobject_reference"
        value: $reviewIdsJson
      }
    ]
  ) {
    metafields {
      id
      namespace
      key
      type
      value
    }
    userErrors {
      field
      message
      code
    }
  }
}
